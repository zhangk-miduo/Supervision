# Supervision жөјдҪ·з¬ҹйҸ…йёҝе…ҳйҗ«пҪ…е§ҷйӘһеҶІеҪҙ йҲҘж–әвӮ¬?йҗўзҶ¶йӘҮзјӮж Ёеё“
# зҖөз‘°оҳ»з»”оҲҡеҪӣй”ӣ?002й”ӣеңўginx йҚҷе¶„е”¬йҚ“е¶ҮоҒ¬ + /api йҚҡеәЈоҒ¬й”ӣ?
# йҸҒзүҲеөҒжҗҙ?/ Redis / RabbitMQ жө е‘ӯоҶҗйҚЈг„©жЈҝжөңжҺ—вӮ¬ж°ҫзҙқж¶“е¶ҶжҜҡй—ҮжҸ’еҹҢзҖ№еӨёеҜҢйҸҲе“„еҸ•зјғжҲҷвӮ¬?
#
# йҚҡоҲҡе§©й”ӣ?docker compose up -d --build
# йҚӢж»„о„ӣй”ӣ?docker compose down
# йҸғгғҘз№”й”ӣ?docker compose logs -f api

services:
  mysql:
    image: mysql:8.0.36
    container_name: supervision-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-buffer-pool-size=64M
    environment:
      MYSQL_ROOT_PASSWORD: [removed-secret]
      MYSQL_DATABASE: supervision
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./build/backend/src/main/resources/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p[removed-secret]"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: supervision-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: supervision-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: supervision
      RABBITMQ_DEFAULT_PASS: [removed-secret]
    volumes:
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15

  api:
    build:
      context: ./build/backend
      dockerfile: Dockerfile
    image: supervision-api:latest
    container_name: supervision-api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: supervision
      DB_USERNAME: supervision
      DB_PASSWORD: [removed-secret]
      SUPERVISION_CRYPTO_KEY: ${SUPERVISION_CRYPTO_KEY}
      SUPERVISION_ADMIN_USERNAME: ${SUPERVISION_ADMIN_USERNAME:-admin}
      SUPERVISION_ADMIN_PASSWORD: ${SUPERVISION_ADMIN_PASSWORD:-}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: supervision
      RABBITMQ_PASSWORD: [removed-secret]
      # Spring Boot з‘ҷеӢ®еҜ–йҗңоҲҡо•ЁйҚҷж©Җеҷәй”ӣе ўвҖҳж·ҮжҝҲзІҰзҖ№ж°¬еҹҢ spring.rabbitmq.*й”ӣ?
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: supervision
      SPRING_RABBITMQ_PASSWORD: [removed-secret]
      TZ: Asia/Shanghai
      # й–Ҫе қоҮ® 2G йҚҗе‘ӯз“ЁйҸҲе¶…е§ҹйҚЈг„Ұж•№з»ұСғзҲўйҚҗе‘ӯз“Ё
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC -Duser.timezone=Asia/Shanghai"
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    image: supervision-web:latest
    container_name: supervision-web
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8002:80"

volumes:
  mysql-data:
