server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: supervision
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:supervision}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:supervision}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: 0
    rabbitmq:
      host: ${RABBITMQ_HOST:rabbitmq}
      port: ${RABBITMQ_PORT:5672}
      username: ${RABBITMQ_USERNAME:guest}
      password: ${RABBITMQ_PASSWORD:}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org.quartz.scheduler.instanceName: SupervisionScheduler
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.job-store-class: org.quartz.impl.jdbcjobstore.JobStoreTX
      org.quartz.job-store-driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
      org.quartz.job-store-isClustered: false
      org.quartz.threadPool-threadCount: 5
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.company.supervision: info
    org.springframework.web: warn

supervision:
  crypto-key: ${SUPERVISION_CRYPTO_KEY:[removed-secret]}
  bootstrap-admin:
    username: ${SUPERVISION_ADMIN_USERNAME:admin}
    password: ${SUPERVISION_ADMIN_PASSWORD:}
